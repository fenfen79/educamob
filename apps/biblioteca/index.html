<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca de Conteúdos - Educamob</title>
  
  <!-- CSS Compartilhado -->
  <link rel="stylesheet" href="../../shared/css/design-system.css?v=7">
  
  <!-- Estilos Locais da Biblioteca -->
  <style>
    </style>

  <!-- Componentes e Dados -->
  <script src="../../shared/components/header.js?v=16"></script>
  <script src="../../shared/components/footer.js"></script>
  <script src="../../shared/js/data-registry.js"></script>
  <script src="../../shared/js/analytics.js"></script>

  <!-- Supabase & Auth Guard -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../shared/js/supabase-client.js"></script>
  <script src="../../shared/js/auth-guard.js"></script>
</head>
<body>

  <educamob-header back-url="../hub/index.html"></educamob-header>

  <main>
    <section class="hero-compact">
      <div class="container">
        <h1 class="hero-title">O que vamos estudar hoje?</h1>
      </div>
    </section>

    <div class="container">
      <div class="filters-bar">
        <div class="search-wrapper">
          <input type="search" id="filter-search" class="search-input" placeholder="Busque por assunto ou palavra-chave">
        </div>

        <div class="filter-group">
          <label for="filter-nivel">Nível</label>
          <select id="filter-nivel" class="filter-select">
            <option value="todos">Todos os níveis</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label for="filter-serie">Série</label>
          <select id="filter-serie" class="filter-select" disabled>
            <option value="todos">Todas as séries</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label for="filter-disciplina">Matéria</label>
          <select id="filter-disciplina" class="filter-select" disabled>
            <option value="todos">Todas as matérias</option>
          </select>
        </div>
      </div>

      <div class="results-meta">
        <span id="results-count">Carregando conteúdos...</span>
      </div>

      <div id="cards-container" class="cards-grid">
        <!-- Cards renderizados dinamicamente via JS -->
      </div>
      
      <div id="empty-state" class="empty-state" style="display: none; padding: 3rem; text-align: center;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.3; margin-bottom: 1rem;">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <p id="empty-message">Nenhum conteúdo encontrado para esse filtro 🔍</p>
        <button id="btn-clear-filters" class="btn btn-secondary btn-clear">Limpar Filtros</button>
      </div>
    </div>
  </main>

  <educamob-footer></educamob-footer>

  <!-- Lógica da Página -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Inicializa Variáveis e Elementos
      const registry = window.EDUCAMOB_REGISTRY || [];
      const spas = registry.filter(item => item.tipo === 'spa');
      
      const elSearch = document.getElementById('filter-search');
      const elNivel = document.getElementById('filter-nivel');
      const elSerie = document.getElementById('filter-serie');
      const elDisciplina = document.getElementById('filter-disciplina');
      const elCards = document.getElementById('cards-container');
      const elCount = document.getElementById('results-count');
      const elEmpty = document.getElementById('empty-state');
      const elEmptyMsg = document.getElementById('empty-message');
      const elBtnClear = document.getElementById('btn-clear-filters');

      if (spas.length === 0) {
        elEmptyMsg.textContent = "Conteúdos em desenvolvimento 🚧";
        elCount.textContent = "0 conteúdos";
        elEmpty.style.display = "flex";
        elEmpty.style.flexDirection = "column";
        elEmpty.style.alignItems = "center";
        elNivel.disabled = true;
        elSearch.disabled = true;
        elBtnClear.style.display = 'none';
        return;
      }

      // 2. Extrai opções únicas
      const getUnique = (data, key) => [...new Set(data.map(item => item[key]))].filter(Boolean).sort();

      // 3. Preenche selects
      const populateSelect = (selectEl, options, defaultText) => {
        selectEl.innerHTML = `<option value="todos">${defaultText}</option>`;
        options.forEach(opt => {
          selectEl.innerHTML += `<option value="${opt}">${opt}</option>`;
        });
        selectEl.disabled = options.length === 0;
      };

      // Inicializa Nível
      populateSelect(elNivel, getUnique(spas, 'nivel'), "Todos os níveis");

      // 4. Lógica de cascata
      const updateFilters = () => {
        const selectedNivel = elNivel.value;
        const selectedSerie = elSerie.value;
        const selectedDisciplina = elDisciplina.value;

        // Filtra os dados com base na seleção atual para saber quais próximas opções habilitar
        let dataLevel1 = spas;
        if (selectedNivel !== 'todos') {
          dataLevel1 = spas.filter(item => item.nivel === selectedNivel);
        }
        
        let dataLevel2 = dataLevel1;
        if (selectedSerie !== 'todos') {
          dataLevel2 = dataLevel1.filter(item => item.serie === selectedSerie);
        }

        // Atualiza as opções do próximo nível (mantendo o valor selecionado se ainda existir nas novas opções)
        const currentSerie = elSerie.value;
        populateSelect(elSerie, getUnique(dataLevel1, 'serie'), "Todas as séries");
        if (getUnique(dataLevel1, 'serie').includes(currentSerie)) elSerie.value = currentSerie;

        const currentDisc = elDisciplina.value;
        populateSelect(elDisciplina, getUnique(dataLevel2, 'disciplina'), "Todas as matérias");
        if (getUnique(dataLevel2, 'disciplina').includes(currentDisc)) elDisciplina.value = currentDisc;

        renderCards();
      };

      // 5. Renderização dos cards
      const renderCards = () => {
        const searchTerm = elSearch.value.toLowerCase().trim();
        const selectedNivel = elNivel.value;
        const selectedSerie = elSerie.value;
        const selectedDisciplina = elDisciplina.value;

        const filtered = spas.filter(item => {
          // Filtro por menus dropdown
          const matchNivel = (selectedNivel === 'todos' || item.nivel === selectedNivel);
          const matchSerie = (selectedSerie === 'todos' || item.serie === selectedSerie);
          const matchDisciplina = (selectedDisciplina === 'todos' || item.disciplina === selectedDisciplina);
          
          // Filtro de texto (busca em título, descrição e tags)
          let matchText = true;
          if (searchTerm !== '') {
            const tagsStr = (item.tags || []).join(' ').toLowerCase();
            const titleStr = (item.titulo || '').toLowerCase();
            const descStr = (item.descricao || '').toLowerCase();
            matchText = titleStr.includes(searchTerm) || descStr.includes(searchTerm) || tagsStr.includes(searchTerm);
          }

          return matchNivel && matchSerie && matchDisciplina && matchText;
        });

        elCount.textContent = `Mostrando ${filtered.length} conteúdo(s)`;

        if (filtered.length === 0) {
          elCards.innerHTML = '';
          elEmpty.style.display = "flex";
          elEmpty.style.flexDirection = "column";
          elEmpty.style.alignItems = "center";
          return;
        }

        elEmpty.style.display = "none";
        
        let html = '';
        filtered.forEach((item, index) => {
          const delay = index * 0.05; // Cascading animation
          
          const imgHtml = item.thumbnail 
            ? `<div class="card-image"><img src="../../${item.thumbnail}" alt="${item.titulo}"></div>`
            : `<div class="card-image">📚</div>`;

          html += `
            <div class="card" style="animation-delay: ${delay}s">
              ${imgHtml}
              <div class="card-content">
                <span class="card-badge">${item.serie || ''} • ${item.disciplina || ''}</span>
                <h3 class="card-title">${item.titulo}</h3>
                <div class="card-footer">
                  <a href="../../${item.path}" class="card-link" onclick="handleAccess('${item.id}', event)">Abrir Conteúdo ➔</a>
                </div>
              </div>
            </div>
          `;
        });
        
        elCards.innerHTML = html;
      };

      // Limpar Filtros
      const clearFilters = () => {
        elSearch.value = '';
        elNivel.value = 'todos';
        updateFilters(); // cascata cuida do resto
      };

      // 6. Listeners
      elNivel.addEventListener('change', () => { elSerie.value = 'todos'; elDisciplina.value = 'todos'; updateFilters(); });
      elSerie.addEventListener('change', () => { elDisciplina.value = 'todos'; updateFilters(); });
      elDisciplina.addEventListener('change', updateFilters);
      
      // Debounce simples para a busca
      let timeout = null;
      elSearch.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(renderCards, 300);
      });

      elBtnClear.addEventListener('click', clearFilters);

      // Função global para o onclick
      window.handleAccess = function(id, e) {
        if (window.EducamobAnalytics && window.EducamobAnalytics.registrarAcesso) {
          window.EducamobAnalytics.registrarAcesso(id);
        }
      };

      // Inicializa a primeira renderização
      updateFilters();
    });
  </script>
</body>
</html>
