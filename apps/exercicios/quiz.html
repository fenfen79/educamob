<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Interativo - Educamob</title>
  
  <link rel="stylesheet" href="../../shared/css/design-system.css?v=3">
  
  <style>
    .quiz-container {
      width: 100%;
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .progress-bar-bg {
      flex-grow: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      margin: 0 1.5rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
    }

    .save-indicator {
      font-size: 0.85rem;
      color: #4caf50;
      margin-left: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s ease;
      font-weight: 700;
    }

    .save-indicator.show {
      opacity: 1;
      animation: pulseSave 0.5s ease;
    }

    @keyframes pulseSave {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); color: var(--primary); }
      100% { transform: scale(1); color: #4caf50; }
    }

    .question-box {
      margin-bottom: 2rem;
    }

    .question-text {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .option-btn {
      text-align: left;
      padding: 1.2rem;
      border: 2px solid var(--border);
      background: var(--bg-card);
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text);
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: rgba(255,106,0,0.05);
    }

    .option-btn.selected {
      border-color: var(--primary);
      background: rgba(255,106,0,0.1);
    }

    .option-btn.correct {
      border-color: #4caf50;
      background: rgba(76, 175, 80, 0.1);
      color: #2e7d32;
    }

    .option-btn.wrong {
      border-color: #f44336;
      background: rgba(244, 67, 54, 0.1);
      color: #c62828;
    }

    .feedback-box {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 8px;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .feedback-box.success {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid #4caf50;
    }

    .feedback-box.error {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid #f44336;
    }

    .feedback-title {
      font-weight: 800;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .feedback-text {
      font-size: 1rem;
      line-height: 1.5;
    }

    .actions {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
    }

    .finish-screen {
      text-align: center;
      display: none;
    }

    .score-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 8px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0 auto 2rem;
    }
  </style>

  <script src="../../shared/components/header.js?v=15"></script>
  <script src="../../shared/components/footer.js"></script>
</head>
<body>

  <educamob-header back-url="index.html"></educamob-header>

  <main class="quiz-container">
    <div id="quiz-content">
      <div class="quiz-header">
        <span id="progress-text">Questão 1/5</span>
        <div class="progress-bar-bg">
          <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
        <span id="save-indicator" class="save-indicator">✓ Salvo</span>
      </div>

      <div class="question-box">
        <h2 id="question-text" class="question-text">Carregando...</h2>
        <div id="options-container" class="options-grid">
          <!-- Options rendered via JS -->
        </div>
      </div>

      <div id="feedback-box" class="feedback-box">
        <div id="feedback-title" class="feedback-title"></div>
        <div id="feedback-text" class="feedback-text"></div>
      </div>

      <div class="actions">
        <button id="btn-confirm" class="btn btn-primary" disabled>Confirmar Resposta</button>
        <button id="btn-next" class="btn btn-primary" style="display: none;">Próxima Questão ➔</button>
      </div>
    </div>

    <div id="finish-screen" class="finish-screen">
      <h2 style="font-size: 2rem; margin-bottom: 2rem;">Revisão Concluída!</h2>
      <div id="score-circle" class="score-circle">0%</div>
      <p id="finish-msg" style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem;"></p>
      <button class="btn btn-primary" onclick="window.location.href='index.html'">Voltar para Revisões</button>
      <button class="btn btn-secondary" onclick="restartQuiz()" style="margin-left: 1rem;">Tentar Novamente</button>
    </div>
  </main>

  <educamob-footer></educamob-footer>

  <script src="../../shared/js/quiz.js"></script>
  <script>
    let engine;
    let selectedOptionIndex = null;
    let hasAnsweredCurrent = false;

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const subjectId = urlParams.get('subject');

      if (!subjectId || !window.MOCK_QUIZZES[subjectId]) {
        alert("Assunto não encontrado.");
        window.location.href = 'index.html';
        return;
      }

      engine = new QuizEngine(subjectId);
      engine.loadState();

      if (engine.state.finished) {
         showFinishScreen();
      } else {
         renderQuestion();
      }

      document.getElementById('btn-confirm').addEventListener('click', handleConfirm);
      document.getElementById('btn-next').addEventListener('click', handleNext);
    });

    function restartQuiz() {
      engine.reset();
      document.getElementById('finish-screen').style.display = 'none';
      document.getElementById('quiz-content').style.display = 'block';
      renderQuestion();
    }

    function renderQuestion() {
      const q = engine.getCurrentQuestion();
      const progress = engine.getProgress();

      document.getElementById('progress-text').innerText = `Questão ${progress.current}/${progress.total}`;
      document.getElementById('progress-fill').style.width = `${progress.percent}%`;
      
      document.getElementById('question-text').innerText = q.text;
      
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';
      
      q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => selectOption(index, btn);
        optionsContainer.appendChild(btn);
      });

      // Check if already answered to prevent refresh exploits
      const answerObj = engine.state.answers[engine.state.currentQuestionIndex];
      if (answerObj) {
         hasAnsweredCurrent = true;
         selectedOptionIndex = answerObj.selectedOptionIndex;
         
         const buttons = document.querySelectorAll('.option-btn');
         buttons.forEach(btn => btn.disabled = true);
         
         buttons[q.correctIndex].classList.add('correct');
         if (!answerObj.isCorrect) {
            buttons[selectedOptionIndex].classList.add('wrong');
         }

         const feedbackBox = document.getElementById('feedback-box');
         const feedbackTitle = document.getElementById('feedback-title');
         const feedbackText = document.getElementById('feedback-text');

         feedbackBox.style.display = 'block';
         if (answerObj.isCorrect) {
           feedbackBox.className = 'feedback-box success';
           feedbackTitle.innerHTML = '✅ Correto!';
         } else {
           feedbackBox.className = 'feedback-box error';
           feedbackTitle.innerHTML = '❌ Incorreto!';
         }
         feedbackText.innerText = q.resolution;

         document.getElementById('btn-confirm').style.display = 'none';
         document.getElementById('btn-next').style.display = 'inline-flex';
         if (engine.state.currentQuestionIndex === engine.state.totalQuestions - 1) {
            document.getElementById('btn-next').innerText = "Finalizar Revisão ✔️";
         }
      } else {
        // Reset state for unanswered
        selectedOptionIndex = null;
        hasAnsweredCurrent = false;
        document.getElementById('btn-confirm').disabled = true;
        document.getElementById('btn-confirm').style.display = 'inline-flex';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('feedback-box').style.display = 'none';
      }
    }

    function selectOption(index, btnEl) {
      if (hasAnsweredCurrent) return;

      selectedOptionIndex = index;
      
      // Clear selections
      document.querySelectorAll('.option-btn').forEach(el => el.classList.remove('selected'));
      // Select current
      btnEl.classList.add('selected');
      
      document.getElementById('btn-confirm').disabled = false;
    }

    function handleConfirm() {
      if (selectedOptionIndex === null || hasAnsweredCurrent) return;

      const result = engine.answerQuestion(selectedOptionIndex);
      hasAnsweredCurrent = true;

      // Update UI
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.disabled = true);

      // Highlight correct and wrong
      buttons[result.correctIndex].classList.add('correct');
      if (!result.isCorrect) {
        buttons[selectedOptionIndex].classList.add('wrong');
      }

      // Show Feedback
      const feedbackBox = document.getElementById('feedback-box');
      const feedbackTitle = document.getElementById('feedback-title');
      const feedbackText = document.getElementById('feedback-text');

      feedbackBox.style.display = 'block';
      if (result.isCorrect) {
        feedbackBox.className = 'feedback-box success';
        feedbackTitle.innerHTML = '✅ Correto!';
      } else {
        feedbackBox.className = 'feedback-box error';
        feedbackTitle.innerHTML = '❌ Incorreto!';
      }
      feedbackText.innerText = result.resolution;

      // Mostrar animação de Salvamento Automático
      const saveInd = document.getElementById('save-indicator');
      saveInd.classList.add('show');
      setTimeout(() => {
         saveInd.classList.remove('show');
      }, 2500);

      // Swap buttons
      document.getElementById('btn-confirm').style.display = 'none';
      document.getElementById('btn-next').style.display = 'inline-flex';
      
      if (engine.state.currentQuestionIndex === engine.state.totalQuestions - 1) {
         document.getElementById('btn-next').innerText = "Finalizar Revisão ✔️";
      }
    }

    function handleNext() {
      const hasNext = engine.nextQuestion();
      if (hasNext) {
        renderQuestion();
      } else {
        showFinishScreen();
      }
    }

    function showFinishScreen() {
      document.getElementById('quiz-content').style.display = 'none';
      document.getElementById('finish-screen').style.display = 'block';

      const score = (engine.state.correctCount / engine.state.totalQuestions) * 100;
      const circle = document.getElementById('score-circle');
      circle.innerText = `${Math.round(score)}%`;

      let color = 'var(--text-muted)';
      let msg = '';
      if (score >= 75) {
        color = '#4caf50';
        msg = 'Excelente! Você domina esse assunto. Farol Verde!';
      } else if (score >= 50) {
        color = '#d4a017';
        msg = 'Bom trabalho, mas ainda pode melhorar. Farol Amarelo.';
      } else {
        color = '#f44336';
        msg = 'Atenção! É importante revisar a teoria. Farol Vermelho.';
      }

      circle.style.borderColor = color;
      circle.style.color = color;
      document.getElementById('finish-msg').innerText = msg;
    }
  </script>
</body>
</html>
